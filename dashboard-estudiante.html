<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Estudiante — Proyecto Tesis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/dashboard-estudiante.css">
</head>
<body>

  <header class="dashboard-header">
    <div class="usuario-info">
      <div class="usuario-avatar" id="avatar-usuario"></div>
      <div class="usuario-datos">
        <h3 id="nombre-usuario"></h3>
        <p id="carrera-usuario"></p>
      </div>
    </div>
    <div class="header-acciones">
      <button class="btn-chat-header" id="btn-chat">
        <img src="images/dashboard-estudiante/icon-chat-bubble.svg" alt="Chat" class="btn-chat-icon">
      </button>
      <button class="btn-ayuda-header" id="btn-ayuda">Ayuda</button>
    </div>
  </header>

  <main class="dashboard-main">
    <!-- Contenido de Dashboard Estudiante -->
    <section class="bienvenida-section">
      <h1 id="mensaje-bienvenida"></h1>
      <p>
        Continúa desarrollando tu tesis con confianza
      </p>
    </section>

    <section class="resumen-grid">
      <article class="resumen-card">
        <img src="images/dashboard-estudiante/icon-tesis.svg" alt="" class="indicador-svg">
        <h2 id="tesis-activas"></h2>
        <span>Tesis activas</span>
      </article>
      <article class="resumen-card">
        <img src="images/dashboard-estudiante/icon-check-circle.svg" alt="" class="indicador-svg">
        <h2 id="progreso-promedio"></h2>
        <span>Progreso promedio</span>
      </article>
      <article class="resumen-card">
        <img src="images/dashboard-estudiante/icon-exclamation-triangle.svg" alt="" class="indicador-svg">
        <h2 id="alertas-pendientes"></h2>
        <span>Alertas pendientes</span>
      </article>
      <article class="resumen-card">
        <img src="images/dashboard-estudiante/icon-arrow-trending-up.svg" alt="" class="indicador-svg">
        <h2 id="dias-racha"></h2>
        <span>Días de racha</span>
      </article>
    </section>

    <section class="contenido-grid">
      <section class="tesis-column">
        <div class="tesis-header">
          <h2>Mis Tesis</h2>
          <button class="btn-crear-nueva" id="btn-nueva-tesis">+ Nueva tesis</button>
        </div>
        <div id="contenedor-tesis"></div>
      </section>

      <aside class="sidebar-column">

        <section class="sidebar-card">
          <h3>Actividad reciente</h3>
          <ul class="lista-actividad" id="lista-actividad"></ul>
        </section>

        <section class="recursos-card">
          <h3>Recursos disponibles</h3>
          <p>Accede a plantillas y guías metodológicas</p>
          <button class="btn-recursos-morado" id="btn-recursos">
            <img src="images/dashboard-estudiante/icon-descargar.svg" alt="" class="btn-recursos-icon">
            Ver recursos
          </button>
        </section>

        <section class="sidebar-card">
          <div class="titulo-hitos-contenedor">
            <img src="images/dashboard-estudiante/icon-calendar.svg" alt="" class="titulo-hitos-svg">
            <h3>Próximos hitos</h3>
          </div> 
          <ul class="lista-hitos" id="lista-hitos"></ul>
        </section>
      </aside>
    </section>
  </main>

  <footer>
    <!-- Footer compartido -->
  </footer>

  <script src="scripts/global.js"></script>
  <script src="scripts/dashboard-estudiante.js"></script>
</body>
</html>
>
